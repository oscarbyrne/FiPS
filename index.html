<head>
  <style>
    * {
      margin: 1em;
    }
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
      padding: 0.5em;
    }
    th {
      background-color: ButtonFace;
    }

</head>
<body>
  <div id="config">
  <!-- ring inputs injected here -->
  </div>
  
  <div id="actions">
    <button id="addRingBtn">Add ring</button>
    <button id="showPcsBtn">Show pc sets</button>
  </div>
  
  <table>
    <thead>
      <tr>
        <th>pc set</th>
        <th>m</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <!-- Rows injected by JS -->
    </tbody>
  </table>
</body>

<script>
  const config = document.getElementById('config')
  const addRingBtn = document.getElementById('addRingBtn');
  const showPcsBtn = document.getElementById('showPcsBtn');
  const tableBody = document.getElementById('tableBody');
  
  function addRing(value = null) {
    const row = document.createElement('div');
  
    const input = document.createElement('input');
    input.type = 'text';
    input.autocomplete = 'off';
  
    const removeBtn = document.createElement('button');
    removeBtn.title = 'Remove';
    removeBtn.innerHTML = 'x';
    removeBtn.addEventListener('click', () => {
      row.remove()
    })
  
    row.append(input, removeBtn);
    config.appendChild(row)
    if(value != null) {
      input.value = value;
    } else {
      input.focus();
    }
  }
  
  function getConfigValues() {
    const inputs = [...config.querySelectorAll('input')];
    const values = inputs.map(i => i.value);
    return values;
  }

  function populateTable(rows) {
    tableBody.innerHTML = "";
    rows.forEach((row) => {
      const tr = document.createElement("tr");
      row.forEach((col) => {
        const td = document.createElement("td");
        td.textContent = col;
        tr.appendChild(td);
      });
      tableBody.appendChild(tr);
    });
  }

  function J(d, m, k) {
      if (d.length < 2 || m.length < 1) return k;
      k = J(d.slice(1), m.slice(1), k);
      return Math.floor((k * d[0] + m[0]) / d[1]);
  }
  
  function* pairwise(arr) {
      for (let i = 0; i < arr.length - 1; i++) yield [arr[i], arr[i + 1]];
  }
  
  function* product(...pools) {
      if (!pools.length) { yield []; return; }
      const indices = new Array(pools.length).fill(0);
      while (true) {
          yield indices.map((idx, i) => pools[i][idx]);
          let i = pools.length - 1;
          while (i >= 0 && ++indices[i] === pools[i].length) indices[i--] = 0;
          if (i < 0) return;
      }
  }
  
  function buildScalesToM(config) {
      const ranges = Array.from(pairwise(config), ([a, b]) =>
          Array.from({ length: a * b }, (_, i) => i)
      );
  
      const scalesToM = new Map();
  
      for (const m of product(...ranges)) {
          const key = Array.from({ length: config.at(-1) }, (_, k) =>
              J(config, m, k) % config[0]
          ).join(',');
  
          const bucket = scalesToM.get(key);
          if (bucket) bucket.push(m);
          else scalesToM.set(key, [m]);
      }
  
      return scalesToM;
  }
  
  addRingBtn.addEventListener('click', () => addRing());
  showPcsBtn.addEventListener('click', () => {
    const values = getConfigValues();

    // );
  });
  
  addRing(12)

</script>
