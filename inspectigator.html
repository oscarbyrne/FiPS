<head>
  <title>Inspectigator</title>
  <style>
    input {
      margin: 0.25em;
      width: 3em;
      box-sizing: border-box;
    }
    button {
      margin: 0.25em;
      width: 3em;
      box-sizing: border-box;
    }
    #ringControl {
      display: flex;
      gap: 0;
    }
    table, th, td {
      margin: 0.25em;
      border: 1px solid black;
      border-collapse: collapse;
      padding: 0.5rem;
    }
    td {
      vertical-align: top;
    }
    th {
      background-color: ButtonFace;
    }
  </style>
</head>
<body>
  <div id="ringInputs">
    <input class="ringInput" type="number" value="12">
  </div>
  <div id="ringControl">
    <button id="subRingBtn" tabindex="-1">-</button>
    <button id="addRingBtn" tabindex="-1">+</button>
    <button id="showBtn" tabindex="-1">!</button>
  </div>
  <table id="outputTable">
    <thead>
      <tr>
        <th>pin</th>
        <th>k class set</th>
        <th>config</th>
        <th>m</th>
      </tr>
    </thead>
    <tbody>
      <!-- Rows injected by JS -->
    </tbody>
    <tbody>
      <!-- Rows injected by JS -->
    </tbody>
  </table>
</body>
<script>
  function getFocusedRingInput() {
    const focused = document.activeElement;
    if (focused && focused.classList.contains('ringInput')) {
      return focused;
    } else {
      return ringInputs.lastElementChild;
    }
  }
  
  function addRing() {
    const input = document.createElement('input');
    input.type = 'number';
    input.classList.add('ringInput');
    const focused = getFocusedRingInput();
    focused.after(input);
    input.focus();
  }
  
  function subRing() {
    const focused = getFocusedRingInput();
    if (focused !== focused.parentElement.firstElementChild) {
      focused.previousElementSibling.focus();
      focused.remove();
    }
  }
  
  function getConfig() {
    const inputs = [...ringInputs.querySelectorAll('input')];
    return inputs.map(i => Number(i.value));
  }
  
  function J(d, m, k) {
    if (d.length < 2 || m.length < 1) return k;
    k = J(d.slice(1), m.slice(1), k);
    return Math.floor((k * d[0] + m[0]) / d[1]);
  }
  
  function range(n) {
    return Array.from({ length: n }, (_, n) => n);
  }
  
  function* product(...pools) {
    if (!pools.length) { yield []; return; }
    const indices = new Array(pools.length).fill(0);
    while (true) {
      yield indices.map((idx, i) => pools[i][idx]);
      let i = pools.length - 1;
      while (i >= 0 && ++indices[i] === pools[i].length) indices[i--] = 0;
      if (i < 0) return;
    }
  }

  let readings = [];
  let pinnedKSets = new Set();

  class Reading {
    constructor(kSet, config, m) {
      this.kSet = kSet;
      this.config = config;
      this.m = m;
    }
    get pinned() {
      return pinnedKSets.has(
        JSON.stringify(this.kSet)
      );
    }
    pin(status) {
      const key = JSON.stringify(this.kSet);
      status ? pinnedKSets.add(key) : pinnedKSets.delete(key);
    }
    compare(that) {
      /*
      Negative value (< 0): this should come before that
      Positive value (> 0): that should come before this
      Zero (=== 0): Keep the original order relative to each other 
      */
      const compareArrayLength = (a, b) => a.length - b.length;
      const compareElements = function(a, b, comparator) {
        let c;
        for (let i = 0; i < a.length; i++) {
          c = comparator(a[i], b[i]);
          if (c !== 0) {
            break;
          } else {
            continue;
          }
        };
        return c;
      };
      const compareArray = function(a, b, elementComparator = (a, b) => a - b) {
        return compareArrayLength(a, b) || compareElements(a, b, elementComparator);
      }
      const compareKClass = (a, b) => a.c - b.c || b.d - a.d;

      return (
        compareArray(this.kSet, that.kSet, compareKClass) ||
        compareArray(this.config, that.config) ||
        compareArray(this.m, that.m)
      );
        
    }
    serialize() {
      return JSON.stringify([
        this.kSet.map((k => [k.c, k.d])),
        this.config,
        this.m
      ]);
    }
    static deserialize(json) {
      const [kSet, config, m] = JSON.parse(json);
      return new Reading(
        kSet.map(([c, d]) => new KClass(c, d)),
        config,
        m
      );
    }
  }

  function greatestCommonDenominator(a, b) {
    return b === 0 ? Math.abs(a) : greatestCommonDenominator(b, a % b);
  }

  class KClass {
    constructor(c, d) {
      const gcd = greatestCommonDenominator(c, d);
      this.c = c / gcd;
      this.d = d / gcd;
    }
    toHTML() {
      return `${this.c}<sub>${this.d}</sub>`
    }
  }
  
  function getReadings(config) {
    const readings = [];
    const rotations = product(
      ...config.slice(0, -1).map(range)
    );
    for (const m of rotations) {
      const beams = range(config.at(-1)); 
      const kSet = beams.map(
        k => new KClass(J(config, m, k), config[0])
      );
      readings.push(
        new Reading(kSet, config, m)
      )
    }
    return readings;
  }

  function createCheckboxCell(checked, onChange) {
    const cell = document.createElement('td');
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = checked;
    checkbox.addEventListener('change', (event) => onChange(event.target.checked));
    cell.appendChild(checkbox);
    return cell;
  }

  function createDataCell(data) {
    const cell = document.createElement('td');
    cell.innerHTML = data;
    return cell;
  }

  function createRow(reading) {
    const row = document.createElement('tr');
    const updatePinnedStatus = function(status) {
      reading.pin(status);
      redrawTable();
    }
    row.appendChild(createCheckboxCell(
      reading.pinned,
      updatePinnedStatus
    ));
    row.appendChild(createDataCell(
      reading.kSet.map(kClass => kClass.toHTML()).join(',')
    ));
    row.appendChild(createDataCell(
      reading.config.join(',')
    ));
    row.appendChild(createDataCell(
      reading.m.join(',')
    ));
    return row;
  }

  function mergeRowSpans(table, offset = 1) {
    const bodies = table.tBodies?.length ? [...table.tBodies] : [table];
    const rows = bodies.flatMap(b => [...b.rows]);
    const cells = rows.map(r => [...r.cells]);
    const vals = cells.map(row => row.map(td => td.textContent.trim()));
    const mergeCols = vals[0].length;
  
    for (let col = 0; col < mergeCols; col++) {
      const depth = col <= offset ? offset + 1 : col + 1;
      for (let i = 0; i < rows.length; ) {
        let span = 1;
        while (i + span < rows.length &&
               vals[i].slice(0, depth).every((v, k) => v === vals[i + span][k])) {
          span++;
        }
        if (span > 1) {
          cells[i][col].rowSpan = span;
          for (let k = 1; k < span; k++) cells[i + k][col].remove();
        }
        i += span;
      }
    }
  }
  
  function redrawTable() {
    for (const tBody of outputTable.tBodies) {
      tBody.innerHTML = "";
    }
    for (const reading of readings) {
      outputTable.tBodies[reading.pinned ? 0 : 1].appendChild(
        createRow(reading)
      );
    }
    mergeRowSpans(outputTable);
  }

  function updateReadings() {
    const config = getConfig();
    const pinned = readings.filter((reading) => reading.pinned);
    const merged = pinned.concat(getReadings(config));
    const serial = merged.map(reading => reading.serialize());
    const unique = new Set(serial);
    readings = [...unique].map((reading) => Reading.deserialize(reading)).toSorted((a, b) => a.compare(b));
  }

  function update() {
    updateReadings();
    redrawTable();
  }
  
  function configHandler(event) {
    if (
      (event.key === '=') ||
      (
        (event.key === 'Tab') &&
        (!event.shiftKey) &&
        (getFocusedRingInput() === ringInputs.lastElementChild)
      )
    ) {
      event.preventDefault();
      addRingBtn.click();
    } else if (
      (event.key === '-') ||
      (
        (event.key === 'Backspace') &&
        (getFocusedRingInput().value.trim() === "")
      )
    ) {
      event.preventDefault();
      subRingBtn.click();
    }
  }
  
  function updateHandler(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      showBtn.click();
    }
  }
  
  addRingBtn.addEventListener('click', addRing);
  subRingBtn.addEventListener('click', subRing);
  showBtn.addEventListener('click', update);
  document.addEventListener('keydown', configHandler);
  document.addEventListener('keydown', updateHandler);
  

</script>
