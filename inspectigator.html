<head>
  <title>Inspectigator</title>
  <style>
    input {
      margin: 0.25em;
      width: 3em;
      box-sizing: border-box;
    }
    button {
      margin: 0.25em;
      width: 3em;
      box-sizing: border-box;
    }
    #ringControl {
      display: flex;
      gap: 0;
    }
    table, th, td {
      margin: 0.25em;
      border: 1px solid black;
      border-collapse: collapse;
      padding: 0.5rem;
    }
    td {
      vertical-align: top;
    }
    th {
      background-color: ButtonFace;
    }
  </style>
</head>
<body>
  <div id="ringInputs">
    <input class="ringInput" type="number" value="12">
  </div>
  <div id="ringControl">
    <button id="subRingBtn" tabindex="-1">-</button>
    <button id="addRingBtn" tabindex="-1">+</button>
    <button id="showBtn" tabindex="-1">!</button>
  </div>
  <table id="outputTable">
    <thead>
      <tr>
        <th>pin</th>
        <th>k set</th>
        <th>config</th>
        <th>m</th>
      </tr>
    </thead>
    <tbody>
      <!-- Rows injected by JS -->
    </tbody>
  </table>
</body>
<script>
  function getFocusedRingInput() {
    const focused = document.activeElement;
    if (focused && focused.classList.contains('ringInput')) {
      return focused;
    } else {
      return ringInputs.lastElementChild;
    }
  }
  
  function addRing() {
    const input = document.createElement('input');
    input.type = 'number';
    input.classList.add('ringInput');
    const focused = getFocusedRingInput();
    focused.after(input);
    input.focus();
  }
  
  function subRing() {
    const focused = getFocusedRingInput();
    if (focused !== focused.parentElement.firstElementChild) {
      focused.previousElementSibling.focus();
      focused.remove();
    }
  }
  
  function getConfig() {
    const inputs = [...ringInputs.querySelectorAll('input')];
    return inputs.map(i => Number(i.value));
  }
  
  function J(d, m, k) {
    if (d.length < 2 || m.length < 1) return k;
    k = J(d.slice(1), m.slice(1), k);
    return Math.floor((k * d[0] + m[0]) / d[1]);
  }
  
  function range(n) {
    return Array.from({ length: n }, (_, n) => n);
  }
  
  function* product(...pools) {
    if (!pools.length) { yield []; return; }
    const indices = new Array(pools.length).fill(0);
    while (true) {
      yield indices.map((idx, i) => pools[i][idx]);
      let i = pools.length - 1;
      while (i >= 0 && ++indices[i] === pools[i].length) indices[i--] = 0;
      if (i < 0) return;
    }
  }
  
  function getReadings(config) {
    const readings = [];
    const rotations = product(
      ...config.slice(0, -1).map(range)
    );
    for (const m of rotations) {
      const beams = range(config.at(-1)); 
      const kSet = beams.map(
          k => J(config, m, k)
      );
      readings.push(
        [kSet, config, m]
      )
    }
    return readings;
  }
  
  function compare(a, b) {
    const aIsArray = Array.isArray(a);
    const bIsArray = Array.isArray(b);
  
    // Both are numbers
    if (!aIsArray && !bIsArray) {
      return a - b;
    }
  
    // Treat numbers as single-element arrays if types differ
    if (!aIsArray) a = [a];
    if (!bIsArray) b = [b];
  
    const len = Math.min(a.length, b.length);
  
    for (let i = 0; i < len; i++) {
      const result = compare(a[i], b[i]);
      if (result !== 0) return result;
    }
  
    return a.length - b.length;
  }
  
  function mergeRowSpans(table, offset) {
    const rows = [...table.tBodies[0].rows];
    const cells = rows.map(r => [...r.cells]);
    const vals = cells.map(row => row.map(td => td.textContent.trim()));
    const mergeCols = vals[0].length;
  
    for (let col = 0; col < mergeCols; col++) {
      const depth = col <= offset ? offset + 1 : col + 1;
      for (let i = 0; i < rows.length; ) {
        let span = 1;
        while (i + span < rows.length &&
               vals[i].slice(0, depth).every((v, k) => v === vals[i + span][k])) {
          span++;
        }
        if (span > 1) {
          cells[i][col].rowSpan = span;
          for (let k = 1; k < span; k++) cells[i + k][col].remove();
        }
        i += span;
      }
    }
  }
  
  function addPinCheckbox(row, kSet, pinnedKSets) {
    const pin = row.insertCell(0);
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    const pinned = pinnedKSets.some(
      pinnedKSet => compare(pinnedKSet, kSet) === 0
    );
    if (pinned) {
      checkbox.checked = true;
    }
    pin.appendChild(checkbox);
  }
  
  function getPinnedKSets() {
    const pinned = [];
    for (const row of outputTable.tBodies[0].rows) {
      const checkbox = row.cells[0].children[0];
      if (checkbox && checkbox.checked) {
        pinned.push(
          row.cells[1].textContent.split(',').map(Number)
        )
      }
    }
    return pinned;
  }
  
  let readings = []
  
  function updateReadings() {
    const pinnedKSets = getPinnedKSets();
    const pinnedReadingsOld = readings.filter(
      ([kSet, config, m]) => pinnedKSets.some(
        pinned => compare(pinned, kSet) === 0
      )
    );
    const newConfig = getConfig();
    const newReadings = getReadings(newConfig).filter(
      (newReading) => readings.some(
        oldReading => compare(oldReading, newReading) !== 0
      )
    );
    const pinnedReadingsNew = newReadings.filter(
      ([kSet, config, m]) => pinnedKSets.some(
        pinned => compare(pinned, kSet) === 0
      )
    );
    const mergedPinnedReadings = pinnedReadingsOld.concat(
      pinnedReadingsNew
    );
    const newReadingsNoPinned = newReadings.filter(
      ([kSet, config, m]) => pinnedKSets.every(
        pinned => compare(pinned, kSet) !== 0
      )
    );
    readings = mergedPinnedReadings.toSorted(compare).concat(
      newReadingsNoPinned.toSorted(compare)
    );
    return pinnedKSets;
  }
  
  function clearTable() {
    document.querySelector('#outputTable tbody').innerHTML = "";
  }
  
  function updateTable() {
    const pinnedKSets = updateReadings();
    clearTable();
    for (const reading of readings) {
      const row = outputTable.tBodies[0].insertRow(-1);
      for (const data of reading) {
        const cell = row.insertCell(-1);
        cell.textContent = data.join(',');
      }
      addPinCheckbox(row, reading[0], pinnedKSets);
    }
    mergeRowSpans(outputTable, 1);
  }
  
  function configHandler(event) {
    if (
      (event.key === '=') ||
      (
        (event.key === 'Tab') &&
        (!event.shiftKey) &&
        (getFocusedRingInput() === ringInputs.lastElementChild)
      )
    ) {
      event.preventDefault();
      addRingBtn.click();
    } else if (
      (event.key === '-') ||
      (
        (event.key === 'Backspace') &&
        (getFocusedRingInput().value.trim() === "")
      )
    ) {
      event.preventDefault();
      subRingBtn.click();
    }
  }
  
  function updateHandler(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      showBtn.click();
    }
  }
  
  addRingBtn.addEventListener('click', addRing);
  subRingBtn.addEventListener('click', subRing);
  showBtn.addEventListener('click', updateTable);
  document.addEventListener('keydown', configHandler);
  document.addEventListener('keydown', updateHandler);
  

</script>
