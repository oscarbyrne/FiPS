<head>
  <title>Inspectigator</title>
  <style>
    body {
      padding: 1rem;
    }
    .column {
      flex: 1;
      align-self: flex-start;
    }
    .row {
      margin-block: 0.5rem;
      display: flex;
      align-items: center;
    }
    .inline-button {
      margin-inline: 0.5rem;
    }
    input {
      field-sizing: content;
      min-width: 2rem;
    }
    hr {
      margin-block: 1rem;
    }
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
      padding: 0.5rem;
    }
    th {
      background-color: ButtonFace;
    }
  </style>
</head>
<body>
  <h1>FiPS Inspectigator</h1>
  <div class="row">
    <label>Octave lock:</label>
    <input id="octaveLockCb" type="checkbox" checked>
  </div>
  <div class="row">
    <button id="updateBtn">Update</button>
  </div>
  <div class="row">
    <div class="column">
      <h2>Config</h2>
      <div id="config">
        <!-- ring inputs injected here -->
      </div>
      <div class="row">
        <button id="addRingBtn">Add ring</button>
      </div>
    </div>
    <div class="column">
      <h2>Rotation</h2>
      <div id="rotation">
        <!-- rotation inputs injected here -->
      </div>
      <div class="row">
        <button id="addMBtn">With m</button>
      </div>
    </div>
    <div class="column">
      <h2>Colour</h2>
      <div id="filter">
        <!-- filter inputs injected here -->
      </div>
      <div class="row">
        <button id="addPcBtn">With c</button>
      </div>
    </div>
  </div>
  <hr>
  <table>
    <thead>
      <tr>
        <th>c set</th>
        <th>m</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <!-- Rows injected by JS -->
    </tbody>
  </table>
</body>

<script>
  const config = document.getElementById('config')
  const rotation = document.getElementById('rotation')
  const filter = document.getElementById('filter')
  const addRingBtn = document.getElementById('addRingBtn');
  const addMBtn = document.getElementById('addMBtn');
  const addPcBtn = document.getElementById('addPcBtn');
  const octaveLockCb = document.getElementById('octaveLockCb');
  const updateBtn = document.getElementById('updateBtn');
  const tableBody = document.getElementById('tableBody');

  function addInput(parent, value = null) {
    const row = document.createElement('div');
    row.classList.add("row");
  
    const input = document.createElement('input');
    input.type = 'text';
    input.autocomplete = 'off';
  
    const removeBtn = document.createElement('button');
    removeBtn.title = 'Remove';
    removeBtn.innerHTML = 'x';
    removeBtn.classList.add("inline-button");
    removeBtn.addEventListener('click', () => {
      row.remove()
    })
  
    row.append(input, removeBtn);
    parent.appendChild(row)
    if(value != null) {
      input.value = value;
    } else {
      input.focus();
    }
  }
  
  function getValues(parent) {
    const inputs = [...parent.querySelectorAll('input')];
    const values = inputs.map(i => i.value === "" ? null : Number(i.value));
    return values;
  }

  function populateTable(rows) {
    tableBody.innerHTML = "";
    rows.forEach((row) => {
      const tr = document.createElement("tr");
      row.forEach((col) => {
        const td = document.createElement("td");
        td.textContent = col;
        tr.appendChild(td);
      });
      tableBody.appendChild(tr);
    });
  }

  function J(d, m, k) {
      if (d.length < 2 || m.length < 1) return k;
      k = J(d.slice(1), m.slice(1), k);
      return Math.floor((k * d[0] + m[0]) / d[1]);
  }
  
  function* pairwise(arr) {
      for (let i = 0; i < arr.length - 1; i++) yield [arr[i], arr[i + 1]];
  }
  
  function* product(...pools) {
      if (!pools.length) { yield []; return; }
      const indices = new Array(pools.length).fill(0);
      while (true) {
          yield indices.map((idx, i) => pools[i][idx]);
          let i = pools.length - 1;
          while (i >= 0 && ++indices[i] === pools[i].length) indices[i--] = 0;
          if (i < 0) return;
      }
  }
  
  function buildScalesToM(config, rotation, filter) {
      const length = octaveLockCb.checked ? (a, b) => a : (a, b) => a * b;
    
      const ranges = Array.from(pairwise(config), ([a, b]) =>
          Array.from({ length: length(a, b) }, (_, i) => i)
      );
  
      const scalesToM = new Map();
  
      for (const m of product(...ranges)) {
          const mPrefixMatch = rotation.every(
            (val, i) => val === null || val === m[i]
          );
          if (!mPrefixMatch) {
            continue;
          }
          const pcs = Array.from(
            { length: config.at(-1) }, (_, k) => J(config, m, k) % config[0]
          );
          const allPcMatch = filter.every(pc => pcs.includes(pc));
          if (!allPcMatch) {
            continue;
          }
          const key = `{${pcs.toSorted((a, b) => a - b).join(',')}}`;
          const bucket = scalesToM.get(key);
          if (bucket) bucket.push(m);
          else scalesToM.set(key, [m]);
      }
  
      return scalesToM;
  }

  function update() {
    const configValues = getValues(config);
    const rotationValues = getValues(rotation);
    const filterValues = getValues(filter);
    const scalesToM = buildScalesToM(configValues, rotationValues, filterValues);
    populateTable(
      Array.from(scalesToM, ([k, v]) => [k, v.map((i) => `[${i.join(',')}]`).join(', ')])
    );
  }
  
  addRingBtn.addEventListener('click', () => addInput(config));
  addMBtn.addEventListener('click', () => addInput(rotation));
  addPcBtn.addEventListener('click', () => addInput(filter));
  updateBtn.addEventListener('click', () => update());
  
  addInput(config, 12);
  update();

</script>
